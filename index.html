<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文档主页</title>
    <style>
        /* ===== 基础样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        /* ===== 页面容器 ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: white;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* ===== 文档列表页 ===== */
        .doc-list {
            display: none;
        }

        .doc-list.active {
            display: block;
        }

        .list-title {
            font-size: 1.5em;
            margin-bottom: 25px;
            color: #444;
            padding-left: 10px;
            border-left: 4px solid #667eea;
        }

        .doc-item {
            background: white;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #e8e8e8;
        }

        .doc-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }

        .doc-item-title {
            font-size: 1.25em;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .doc-item-date {
            font-size: 0.85em;
            color: #999;
        }

        .doc-empty {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .doc-empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* ===== 文档内容页 ===== */
        .doc-content {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }

        .doc-content.active {
            display: block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            cursor: pointer;
            margin-bottom: 30px;
            font-size: 0.95em;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .back-btn:hover {
            background: #f0f2ff;
            border-color: #667eea;
        }

        .content-title {
            font-size: 2em;
            margin-bottom: 10px;
            color: #222;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .content-date {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 30px;
            display: block;
        }

        .content-body {
            font-size: 1.05em;
            line-height: 1.8;
            color: #444;
        }

        .content-body h1 { font-size: 1.8em; margin: 30px 0 15px; color: #222; }
        .content-body h2 { font-size: 1.5em; margin: 25px 0 12px; color: #333; }
        .content-body h3 { font-size: 1.25em; margin: 20px 0 10px; color: #444; }
        .content-body p { margin-bottom: 15px; }
        .content-body code {
            background: #f4f4f4;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: "Courier New", monospace;
            font-size: 0.9em;
        }
        .content-body pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 20px 0;
        }
        .content-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .content-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }
        .content-body ul, .content-body ol {
            margin: 15px 0 15px 25px;
        }
        .content-body li {
            margin-bottom: 8px;
        }
        .content-body a {
            color: #667eea;
            text-decoration: none;
        }
        .content-body a:hover {
            text-decoration: underline;
        }
        .content-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }
        .content-body hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 30px 0;
        }
        .content-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .content-body th, .content-body td {
            border: 1px solid #e0e0e0;
            padding: 10px 15px;
            text-align: left;
        }
        .content-body th {
            background: #f8f9fa;
            font-weight: 600;
        }

        /* ===== 加载动画 ===== */
        .loading {
            text-align: center;
            padding: 80px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 错误提示 ===== */
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 0.9em;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .doc-content { padding: 30px 20px; }
            .content-title { font-size: 1.5em; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📚 我的文档库</h1>
            <p>记录学习、分享知识</p>
        </div>

        <!-- 文档列表页 -->
        <div class="doc-list active" id="docList">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载文档列表...</p>
            </div>
        </div>

        <!-- 文档内容页 -->
        <div class="doc-content" id="docContent">
            <div class="back-btn" onclick="showList()">
                ← 返回文档列表
            </div>
            <div id="contentBody"></div>
        </div>
    </div>

    <div class="footer">
        <p>Powered by GitHub Pages</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // ==================== 配置 ====================
        // GitHub 仓库信息（修改这里为你的仓库）
        const CONFIG = {
            owner: 'L-aaaaaaa',           // 你的 GitHub 用户名
            repo: 'L-aaaaaaa.github.io',  // 仓库名
            postsDir: '_posts'            // 文档存放目录
        };

        // ==================== 页面切换 ====================
        function showList() {
            document.getElementById('docList').classList.add('active');
            document.getElementById('docContent').classList.remove('active');
            window.scrollTo(0, 0);
            // 更新 URL
            history.pushState(null, '', window.location.pathname);
        }

        function showContent() {
            document.getElementById('docList').classList.remove('active');
            document.getElementById('docContent').classList.add('active');
            window.scrollTo(0, 0);
        }

        // ==================== 加载文档列表 ====================
        async function loadDocList() {
            const listContainer = document.getElementById('docList');

            try {
                // 调用 GitHub API 获取 _posts 目录下的文件列表
                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.postsDir}`
                );

                if (!response.ok) {
                    if (response.status === 404) {
                        listContainer.innerHTML = `
                            <div class="doc-empty">
                                <div class="doc-empty-icon">📝</div>
                                <h3>还没有文档</h3>
                                <p>在 <code>_posts</code> 文件夹中添加 Markdown 文件即可显示在这里</p>
                            </div>
                        `;
                        return;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const files = await response.json();

                // 筛选 Markdown 文件并按名称排序（最新的在前面）
                const mdFiles = files
                    .filter(f => f.name.endsWith('.md') || f.name.endsWith('.markdown'))
                    .sort((a, b) => b.name.localeCompare(a.name));

                if (mdFiles.length === 0) {
                    listContainer.innerHTML = `
                        <div class="doc-empty">
                            <div class="doc-empty-icon">📝</div>
                            <h3>还没有 Markdown 文档</h3>
                            <p>在 <code>_posts</code> 文件夹中添加 <code>.md</code> 文件即可显示在这里</p>
                        </div>
                    `;
                    return;
                }

                // 渲染文档列表
                let html = '<h2 class="list-title">📄 文档列表</h2>';

                mdFiles.forEach(file => {
                    // 解析文件名：尝试提取日期和标题
                    const parsed = parseFilename(file.name);
                    const title = parsed.title || file.name.replace(/\.md$/, '');
                    const date = parsed.date ? formatDate(parsed.date) : '';

                    html += `
                        <div class="doc-item" onclick="loadDoc('${file.name}', '${escapeHtml(title)}')">
                            <div class="doc-item-title">${escapeHtml(title)}</div>
                            ${date ? `<div class="doc-item-date">📅 ${date}</div>` : ''}
                        </div>
                    `;
                });

                listContainer.innerHTML = html;

            } catch (error) {
                listContainer.innerHTML = `
                    <div class="error-msg">
                        <h3>❌ 加载失败</h3>
                        <p>${error.message}</p>
                        <p style="margin-top:15px; font-size:0.9em;">请检查仓库设置和网络连接</p>
                    </div>
                `;
            }
        }

        // ==================== 加载文档内容 ====================
        async function loadDoc(filename, title) {
            showContent();
            const contentBody = document.getElementById('contentBody');
            contentBody.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载文档内容...</p>
                </div>
            `;

            try {
                const response = await fetch(
                    `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/main/${CONFIG.postsDir}/${filename}`
                );

                if (!response.ok) {
                    throw new Error(`无法加载文档 (HTTP ${response.status})`);
                }

                let markdown = await response.text();

                // 解析文件名中的日期
                const parsed = parseFilename(filename);
                const dateStr = parsed.date ? formatDate(parsed.date) : '';

                // 跳过 YAML front matter（如果存在），并提取其中的 title
                const yamlResult = stripYamlFrontMatter(markdown);
                markdown = yamlResult.content;
                // 如果 YAML 中有 title，优先使用它
                const docTitle = yamlResult.title || title;

                // 渲染内容
                contentBody.innerHTML = `
                    <h1 class="content-title">${escapeHtml(docTitle)}</h1>
                    ${dateStr ? `<span class="content-date">📅 ${dateStr}</span>` : ''}
                    <div class="content-body">${marked.parse(markdown)}</div>
                `;

                // 更新 URL（方便分享）
                const urlParams = new URLSearchParams(window.location.search);
                urlParams.set('doc', filename);
                history.pushState(null, '', `?${urlParams.toString()}`);

            } catch (error) {
                contentBody.innerHTML = `
                    <div class="error-msg">
                        <h3>❌ 加载文档失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // ==================== 工具函数 ====================

        // 跳过 YAML front matter（--- ... ---），返回处理后的内容和提取的 title
        function stripYamlFrontMatter(markdown) {
            const yamlRegex = /^---\s*\n([\s\S]*?)\n---\s*(?:\n|$)/;
            const match = markdown.match(yamlRegex);

            if (!match) {
                return { content: markdown, title: null };
            }

            const yamlContent = match[1];
            const content = markdown.slice(match[0].length).trimStart();

            // 从 YAML 中提取 title
            const titleMatch = yamlContent.match(/^title:\s*["']?(.+?)["']?\s*$/m);
            const title = titleMatch ? titleMatch[1].trim() : null;

            return { content, title };
        }

        // 解析文件名（支持 YYYY-MM-DD-title.md 格式）
        function parseFilename(filename) {
            // 移除扩展名
            const nameWithoutExt = filename.replace(/\.(md|markdown)$/i, '');

            // 匹配日期前缀格式：YYYY-MM-DD-标题
            const match = nameWithoutExt.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
            if (match) {
                return {
                    date: match[1],
                    title: match[2].replace(/-/g, ' ').replace(/_/g, ' ')
                };
            }

            // 没有日期格式，直接返回文件名作为标题
            return {
                date: null,
                title: nameWithoutExt.replace(/-/g, ' ').replace(/_/g, ' ')
            };
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // HTML 转义（防止 XSS）
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadDocList();

            // 检查 URL 参数，如果有 doc 参数则直接打开对应文档
            const urlParams = new URLSearchParams(window.location.search);
            const docParam = urlParams.get('doc');
            if (docParam) {
                const parsed = parseFilename(docParam);
                const title = parsed.title || docParam.replace(/\.md$/, '');
                loadDoc(docParam, title);
            }
        });

        // 浏览器前进/后退按钮支持
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const docParam = urlParams.get('doc');
            if (docParam) {
                const parsed = parseFilename(docParam);
                const title = parsed.title || docParam.replace(/\.md$/, '');
                loadDoc(docParam, title);
            } else {
                showList();
            }
        });
    </script>
</body>
</html>
